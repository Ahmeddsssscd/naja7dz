name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint --quiet
        # Don't fail the build on lint warnings — only errors.
        continue-on-error: false
