<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Connexion — Najaح</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="auth-shell">
  <div class="auth-corner">
    <button class="lang-toggle" id="langToggle" aria-label="Changer la langue">عربي</button>
  </div>

  <div class="auth-card">
    <div class="auth-logo">
      <a href="index.html" class="logo" aria-label="Najaح">
        <span>Naja</span>
        <span class="logo-h">
          ح
          <svg class="logo-cap" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M2 8L12 3L22 8L12 13L2 8Z" fill="currentColor"/>
            <path d="M6 10V14C6 14 8 16 12 16C16 16 18 14 18 14V10" stroke="currentColor" stroke-width="1.5" fill="none"/>
            <line x1="20" y1="9" x2="20" y2="14" stroke="#D4A72C" stroke-width="1.5"/>
            <circle cx="20" cy="15" r="1.2" fill="#D4A72C"/>
          </svg>
        </span>
      </a>
    </div>

    <h1 class="auth-h">Bon retour</h1>
    <p class="auth-sub">Connecte-toi pour continuer le parcours.</p>

    <form>
      <div class="field">
        <label for="email">Adresse email</label>
        <input type="email" id="email" class="input" placeholder="parent@email.com" autocomplete="email" />
      </div>

      <div class="field">
        <label for="pwd" class="flex items-center justify-between" style="display:flex">
          <span>Mot de passe</span>
          <a href="#" style="font-size:12px; color: var(--text-soft); font-weight:500;">Mot de passe oublié ?</a>
        </label>
        <input type="password" id="pwd" class="input" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button type="button" class="btn btn-primary btn-block btn-lg mt-2">Se connecter</button>
    </form>

    <div class="auth-divider">ou</div>

    <button class="btn btn-outline btn-block">
      <svg class="icon-md" viewBox="0 0 24 24" fill="none">
        <path d="M21.8 10.2H12v3.7h5.5c-.5 2.5-2.6 3.8-5.5 3.8-3.4 0-6.1-2.7-6.1-6.1S8.6 5.5 12 5.5c1.5 0 2.9.5 3.9 1.4l2.7-2.7C16.9 2.7 14.6 1.7 12 1.7 6.5 1.7 2 6.2 2 11.7s4.5 10 10 10c5.7 0 9.5-4 9.5-9.7 0-.6-.1-1.2-.2-1.8z" fill="#0F1B33"/>
      </svg>
      Continuer avec Google
    </button>

    <p class="auth-foot">Pas encore de compte ? <a href="inscription.html">Créer un compte parent</a></p>
  </div>
</div>

<nav class="preview-nav">

</nav>

<script src="script.js"></script>
</body>
</html>
